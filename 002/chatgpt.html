<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heritage Motors</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

body {
    font-family: 'Playfair Display', serif;
    background: #f8f6f2;
    color: #1e1e1e;
    margin: 0;
}

.container-custom {
    max-width: 1200px;
    margin: auto;
    padding: 0 20px;
}

/* ================= NAVBAR ================= */

.navbar-custom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 0;
}

.brand {
    font-size: 1.4rem;
    letter-spacing: 3px;
    font-weight: 500;
}

.nav-links a {
    margin-left: 30px;
    font-size: 0.9rem;
    color: #666;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #000;
}

/* ================= HERO ================= */

.hero {
    height: 90vh;
    display: flex;
    align-items: center;
}

.hero h1 {
    font-size: 3.5rem;
    margin-bottom: 20px;
}

.hero p {
    color: #777;
    max-width: 500px;
}

/* ================= GRID ================= */

.section {
    padding: 100px 0;
}

.section-title {
    text-align: center;
    margin-bottom: 70px;
    font-size: 2rem;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
}

.card-car {
    cursor: pointer;
    transition: transform 0.3s ease;
}

.card-car:hover {
    transform: translateY(-6px);
}

.card-car img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 6px;
}

.card-title {
    margin-top: 15px;
    font-size: 1.1rem;
}

/* ================= DETAIL ================= */

.detail {
    display: none;
}

.detail img {
    width: 100%;
    max-width: 900px;
    border-radius: 8px;
    margin-bottom: 30px;
}

.back-btn {
    display: inline-block;
    margin-bottom: 30px;
    cursor: pointer;
    color: #777;
}

/* ================= FOOTER ================= */

.footer {
    text-align: center;
    padding: 60px 0;
    color: #888;
    font-size: 0.9rem;
}

/* ================= RESPONSIVE ================= */

@media(max-width: 992px){
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 600px){
    .grid {
        grid-template-columns: 1fr;
    }

    .hero h1 {
        font-size: 2.4rem;
    }
}

</style>
</head>

<body>

<div class="container-custom">

    <!-- NAVBAR -->
    <div class="navbar-custom">
        <div class="brand">HERITAGE MOTORS</div>
        <div class="nav-links">
            <a href="#" onclick="showHome()">Home</a>
            <a href="#" onclick="showCatalog()">Collection</a>
        </div>
    </div>

    <!-- HERO -->
    <section id="home" class="hero">
        <div>
            <h1>Timeless Automobiles</h1>
            <p>Curated machines for collectors who appreciate heritage, restraint, and enduring design.</p>
        </div>
    </section>

    <!-- CATALOG -->
    <section id="catalog" class="section">
        <h2 class="section-title">Collection</h2>
        <div class="grid" id="car-grid"></div>
    </section>

    <!-- DETAIL -->
    <section id="detail" class="section detail">
        <span class="back-btn" onclick="showCatalog()">← Back</span>
        <div id="detail-content"></div>
    </section>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Heritage Motors — Private Collection
</div>

<script>

/* DATA */

const cars = [
{
    id: "rolls",
    name: "Rolls-Royce Phantom",
    image: "https://images.unsplash.com/photo-1619767886558-efdc259cde1c",
    description: "An uncompromising expression of luxury. Silent, deliberate, and entirely bespoke."
},
{
    id: "300sl",
    name: "Mercedes 300SL Gullwing",
    image: "https://images.unsplash.com/photo-1603386329225-868f9b1ee6b5",
    description: "A landmark in engineering, defined by its iconic doors and racing pedigree."
},
{
    id: "911",
    name: "Porsche 911",
    image: "https://images.unsplash.com/photo-1503376780353-7e6692767b70",
    description: "Precision distilled into form. A silhouette that has endured generations."
},
{
    id: "328",
    name: "BMW 328 Roadster",
    image: "https://images.unsplash.com/photo-1619767886558-efdc259cde1c",
    description: "Pre-war elegance paired with racing spirit."
}
];

/* RENDER */

function renderCars() {
    const grid = document.getElementById("car-grid");
    grid.innerHTML = cars.map(car => `
        <div class="card-car" onclick="openDetail('${car.id}')">
            <img src="${car.image}">
            <div class="card-title">${car.name}</div>
        </div>
    `).join("");
}

/* NAVIGATION */

function showHome() {
    toggleSections("home");
}

function showCatalog() {
    toggleSections("catalog");
}

function openDetail(id) {
    const car = cars.find(c => c.id === id);

    document.getElementById("detail-content").innerHTML = `
        <img src="${car.image}">
        <h1>${car.name}</h1>
        <p>${car.description}</p>
    `;

    toggleSections("detail");
}

/* HELPER */

function toggleSections(active) {
    document.getElementById("home").style.display = active === "home" ? "flex" : "none";
    document.getElementById("catalog").style.display = active === "catalog" ? "block" : "none";
    document.getElementById("detail").style.display = active === "detail" ? "block" : "none";
}

/* INIT */

renderCars();

</script>

</body>
</html>
